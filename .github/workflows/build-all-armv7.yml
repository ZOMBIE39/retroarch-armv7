name: 编译全量 RetroArch ARMv7 NEON 核心
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: libretro/libretro-super
          path: libretro-super
          submodules: recursive
          fetch-depth: 1

      - name: 安装交叉编译环境
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf build-essential cmake git

      - name: 拉取所有核心源码
        run: |
          cd libretro-super
          chmod +x libretro-fetch.sh
          ./libretro-fetch.sh

      - name: 编译全部核心（官方原生脚本，唯一正确）
        run: |
          cd libretro-super
          ./libretro-build-arm.sh

      - name: 收集所有编译好的核心
        run: |
          mkdir -p cores
          find libretro-super -name "*.so" | grep -i "_libretro.so" | xargs cp -t cores/ || true
          echo "====================================="
          echo "✅ 编译完成，核心数量：$(ls cores | wc -l)"
          echo "====================================="

      - name: 上传核心包
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-armv7-neon-full-cores
          path: cores/
