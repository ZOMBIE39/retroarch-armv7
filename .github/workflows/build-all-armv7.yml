name: 编译全部 RetroArch ARMv7-NEON 核心 (终极修复版)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: 检出源码
        uses: actions/checkout@v4
        with:
          repository: libretro/libretro-super
          path: libretro-super
          submodules: recursive
          fetch-depth: 1

      - name: 安装工具链
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf build-essential cmake git

      - name: 拉取所有核心
        run: |
          cd libretro-super
          ./libretro-fetch.sh

      - name: 编译全部 ARMv7 NEON 核心
        run: |
          cd libretro-super
          make -f Makefile.arm \
          platform=unix-armv7-hardfloat-neon \
          CC=arm-linux-gnueabihf-gcc \
          CXX=arm-linux-gnueabihf-g++ \
          AR=arm-linux-gnueabihf-ar \
          LD=arm-linux-gnueabihf-ld \
          CFLAGS="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -O2" \
          CXXFLAGS="-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -O2" \
          all || true

      - name: 收集所有核心
        run: |
          mkdir -p cores
          find libretro-super -name "*_libretro.so" -type f -exec cp {} cores/ \;
          echo "==================================="
          echo 编译完成，核心总数：$(ls cores | wc -l)
          echo "==================================="

      - name: 上传核心包
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-armv7-neon-all-cores
          path: cores/
