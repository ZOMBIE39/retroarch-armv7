name: Build RetroArch Cores for H700 (32-bit)

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 在这里列出你想编译的核心（仓库名）
        core: [fceumm, snes9x, mgba, genesis-plus-gx, picodrive, fbneo, gambatte]

    steps:
      - name: Checkout Core
        uses: actions/checkout@v4
        with:
          repository: libretro/${{ matrix.core }}
          path: ${{ matrix.core }}

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential xz-utils wget
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build Core
        run: |
          cd ${{ matrix.core }}
          # H700 优化参数：Cortex-A53, 32位 armhf
          # 常用参数包括 NEON 加速和 VFPv4
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-gnueabihf-
          export CC=${CROSS_COMPILE}gcc
          export CXX=${CROSS_COMPILE}g++
          
          # 针对全志 H700 的典型 CFLAGS
          # H700 是 Cortex-A53，支持 ARMv8，但 32 位下使用 armv7ve 兼容性最好
          EXT_FLAGS="-marm -mcpu=cortex-a53 -mfpu=neon-fp-armv8 -mfloat-abi=hard"
          
          # 执行编译，通常使用 Makefile
          # platform=unix 是通用选择，部分核心可能需要 platform=armv 或其他
          make -f Makefile platform=unix CFLAGS="$EXT_FLAGS" CXXFLAGS="$EXT_FLAGS" -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.core }}-h700
          path: ${{ matrix.core }}/*.so
