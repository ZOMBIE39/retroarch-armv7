name: 编译全部 RetroArch ARMv7-NEON 核心 (稳定兼容版)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: 检出 libretro-super 源码
        uses: actions/checkout@4
        with:
          repository: libretro/libretro-super
          path: libretro-super
          submodules: recursive
          fetch-depth: 1

      - name: 安装完整交叉编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            build-essential make cmake git autoconf automake libtool \
            libpng-dev libz-dev libasound2-dev

      - name: 配置 ARMv7 + NEON 编译环境
        run: |
          echo "PLATFORM=unix-armv7-hardfloat-neon" >> $GITHUB_ENV
          echo "CC=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CXX=arm-linux-gnueabihf-g++" >> $GITHUB_ENV
          echo "AR=arm-linux-gnueabihf-ar" >> $GITHUB_ENV
          echo "STRIP=arm-linux-gnueabihf-strip" >> $GITHUB_ENV
          # 稳定优化：ARMv7 + NEON + 硬浮点，移除LTO（保证全核心编译）
          echo "CFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC" >> $GITHUB_ENV
          echo "LDFLAGS=-mfloat-abi=hard" >> $GITHUB_ENV
          # 启用经典核心编译（关键！）
          echo "BUILD_LEGACY=1" >> $GITHUB_ENV

      - name: 拉取所有核心源码
        run: |
          cd libretro-super
          chmod +x *.sh
          ./libretro-fetch.sh

      - name: 编译全部 ARMv7-NEON 核心
        run: |
          cd libretro-super
          # 导出变量 + 强制编译 + 失败不中断
          export CC=$CC CXX=$CXX AR=$AR CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS" LDFLAGS="$LDFLAGS" BUILD_LEGACY=1
          ./libretro-build.sh $PLATFORM || true

      - name: 收集所有编译成功的核心
        run: |
          mkdir -p dist_cores
          find "$GITHUB_WORKSPACE/libretro-super" -name "*_libretro.so" -type f | xargs -I {} cp {} dist_cores/
          echo "==================================="
          echo "✅ 编译成功核心总数：$(ls dist_cores | wc -l)"
          echo "==================================="

      - name: 上传完整核心包
        uses: actions/upload-artifact@4
        with:
          name: retroarch-armv7-neon-full-cores
          path: dist_cores/
          retention-days: 30
