name: 编译全部 RetroArch ARMv7-NEON 核心 (含LTO优化)
on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720  # 12小时超时
    steps:
      - name: 检出 libretro-super 官方源码
        uses: actions/checkout@v4
        with:
          repository: libretro/libretro-super
          path: libretro-super
          submodules: recursive
          fetch-depth: 1

      - name: 安装 ARMv7 交叉编译工具链
        run: |
          sudo apt update -y
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf build-essential make cmake git

      - name: 配置编译优化参数（永久生效）
        run: |
          cat >> $GITHUB_ENV << EOF
          CC=arm-linux-gnueabihf-gcc
          CXX=arm-linux-gnueabihf-g++
          AR=arm-linux-gnueabihf-ar
          LD=arm-linux-gnueabihf-ld
          CFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC -flto
          CXXFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC -flto
          LDFLAGS=-mfloat-abi=hard -flto -Wl,--as-needed
          EOF

      - name: 拉取所有核心源码
        run: |
          cd libretro-super
          chmod +x libretro-fetch.sh
          ./libretro-fetch.sh

      - name: 编译所有 ARMv7-NEON 核心（自动跳过失败）
        run: |
          cd libretro-super
          chmod +x libretro-build.sh
          # 官方标准：指定平台编译全核心，强制继续
          ./libretro-build.sh unix-armv7-hardfloat-neon || true

      - name: 收集所有编译成功的核心
        run: |
          mkdir -p dist_cores
          find libretro-super/dist/unix -name "*_libretro.so" -exec cp {} dist_cores/ \;
          echo "==================================="
          echo "✅ 编译成功核心总数：$(ls dist_cores | wc -l)"
          echo "==================================="

      - name: 上传核心文件
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-armv7-neon-lto-cores
          path: dist_cores/
          retention-days: 30
