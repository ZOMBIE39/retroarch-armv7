name: 编译全部 RetroArch ARMv7-NEON 核心 (含LTO优化)
on:
  workflow_dispatch:  # 仅手动触发（全核心编译耗时极长，禁止自动触发）

jobs:
  build-all-cores:
    runs-on: ubuntu-latest
    timeout-minutes: 720  # 最大12小时，保证全核心编译完成
    steps:
      - name: 检出 libretro-super 核心集合源码
        uses: actions/checkout@v4
        with:
          repository: libretro/libretro-super
          path: libretro-super
          submodules: recursive
          fetch-depth: 1

      # 缓存工具链，大幅加速重复构建
      - name: 缓存 ARMv7 交叉编译工具链
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/arm-linux-gnueabihf-*
            /usr/lib/gcc/arm-linux-gnueabihf
          key: ${{ runner.os }}-armv7-toolchain-cache

      - name: 安装交叉编译环境与全量依赖
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            build-essential make cmake git wget zip unzip \
            libpng-dev libfreetype6-dev zlib1g-dev libasound2-dev libgl1-mesa-dev

      - name: 设置核心优化参数 (ARMv7 + NEON + LTO全优化)
        run: |
          echo "CC=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CXX=arm-linux-gnueabihf-g++" >> $GITHUB_ENV
          echo "AR=arm-linux-gnueabihf-ar" >> $GITHUB_ENV
          echo "LD=arm-linux-gnueabihf-ld" >> $GITHUB_ENV
          # ✅ 核心优化：ARMv7 + NEON + 硬浮点 + O2 + LTO性能优化
          echo "CFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC -flto" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC -flto" >> $GITHUB_ENV
          # ✅ LTO 必须同步添加到链接器参数
          echo "LDFLAGS=-mfloat-abi=hard -Wl,--as-needed -flto" >> $GITHUB_ENV
          # 官方指定 ARMv7+NEON 平台
          echo "PLATFORM=unix-armv7-hardfloat-neon" >> $GITHUB_ENV

      - name: 拉取所有 libretro 核心源码
        run: |
          cd libretro-super
          chmod +x libretro-fetch.sh
          ./libretro-fetch.sh --all

      - name: 编译所有可兼容核心 (自动跳过失败项)
        run: |
          cd libretro-super
          chmod +x libretro-build-all.sh
          ./libretro-build-all.sh --platform="$PLATFORM" --continue-on-failure

      - name: 整理编译成功的核心文件
        run: |
          mkdir -p all-retroarch-cores
          find libretro-super/dist/unix -name "*_libretro.so" -exec cp {} all-retroarch-cores/ \;
          echo "✅ 编译完成！成功编译核心数量：$(ls all-retroarch-cores | wc -l)"

      - name: 上传所有优化版核心
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-all-armv7-neon-lto-cores
          path: all-retroarch-cores/
          retention-days: 30  # 保存30天
