name: 批量编译所有 RetroArch 核心 (armv7 H700)

on:
  workflow_dispatch:    # 手动触发（推荐）
  # push:                # 不需要可以注释掉
  #   branches: [ main ]

jobs:
  build-all-cores:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            build-essential git make pkg-config libtool-bin

      - name: 拉取 libretro-super (官方批量编译工具)
        uses: actions/checkout@v4
        with:
          repository: libretro/libretro-super
          submodules: recursive
          fetch-depth: 1

      - name: 拉取所有核心源码
        run: |
          ./libretro-fetch.sh

      - name: 批量编译所有核心 (H700 32位 armv7 + A53 + NEON)
        run: |
          # ==================== 全志 H700 专用优化参数 ====================
          export ARCH=armv7
          export CROSS_COMPILE=arm-linux-gnueabihf-
          export CFLAGS="-march=armv7-a -mtune=cortex-a53 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -ffast-math"
          export CXXFLAGS="$CFLAGS"
          export LDFLAGS="-Wl,--strip-all"

          # 批量编译所有核心
          ./libretro-build.sh armv7-neon

      - name: 收集所有编译好的核心
        run: |
          mkdir -p all-cores
          find . -name "*_libretro.so" -exec cp {} all-cores/ \;
          ls -lh all-cores/

      - name: 上传完整核心包
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-all-cores-armv7-h700
          path: all-cores/
