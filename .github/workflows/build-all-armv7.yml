name: 编译全部 RetroArch ARMv7-NEON 核心 (含LTO优化)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: 检出 libretro-super 源码
        uses: actions/checkout@v4
        with:
          repository: libretro/libretro-super
          path: libretro-super
          submodules: recursive
          fetch-depth: 1

      - name: 安装交叉编译工具链
        run: |
          sudo apt update -y
          sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf build-essential make cmake git

      # ✅ 官方标准：无权限问题的环境变量配置
      - name: 设置编译参数
        run: |
          echo "PLATFORM=unix-armv7-hardfloat-neon" >> $GITHUB_ENV
          echo "CC=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
          echo "CXX=arm-linux-gnueabihf-g++" >> $GITHUB_ENV
          echo "AR=arm-linux-gnueabihf-ar" >> $GITHUB_ENV
          echo "CFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC -flto" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv7-a -mtune=cortex-a9 -mfpu=neon-vfpv4 -mfloat-abi=hard -O2 -fPIC -flto" >> $GITHUB_ENV
          echo "LDFLAGS=-mfloat-abi=hard -flto" >> $GITHUB_ENV

      - name: 拉取所有核心源码
        run: |
          cd libretro-super
          chmod +x libretro-fetch.sh libretro-build.sh
          ./libretro-fetch.sh

      # ✅ 核心修复：编译时直接导出变量，无权限问题
      - name: 编译 ARMv7-NEON 全核心
        run: |
          cd libretro-super
          export CC=$CC CXX=$CXX AR=$AR CFLAGS="$CFLAGS" CXXFLAGS="$CXXFLAGS" LDFLAGS="$LDFLAGS"
          ./libretro-build.sh $PLATFORM || true

      # ✅ 终极修复：全目录搜索核心，绝对能找到
      - name: 收集所有编译成功的核心
        run: |
          mkdir -p dist_cores
          find "$GITHUB_WORKSPACE/libretro-super" -name "*_libretro.so" -type f -exec cp {} dist_cores/ \;
          echo "==================================="
          echo "✅ 编译成功核心总数：$(ls dist_cores | wc -l)"
          echo "==================================="

      - name: 上传核心文件
        uses: actions/upload-artifact@v4
        with:
          name: retroarch-armv7-neon-lto-cores
          path: dist_cores/
          retention-days: 30
